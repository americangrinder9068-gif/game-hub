<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Game Hub</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  header {
    padding: 15px;
    background: #1f1f1f;
    text-align: center;
    font-size: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
    padding: 15px;
  }

  .card {
    background: #1c1c1c;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .card h3 {
    margin: 0;
    padding: 10px;
    background: #2a2a2a;
    font-size: 16px;
  }

  iframe {
    width: 100%;
    height: 250px;
    border: none;
  }
</style>
</head>
<body>

<header>🎮 My Game Hub</header>

<div class="grid">

  <div class="card">
    <h3>Eaglercraft</h3>
    <iframe src="https://eaglercraftweb.com/"></iframe>
  </div>

  <div class="card">
    <h3>Isaac (browser)</h3>
    <iframe src="https://www.play-games.com/iframe/31481.html"></iframe>
  </div>

  <div class="card">
    <h3>Retro Game</h3>
    <iframe src="https://www.retrogames.cc/embed/19458-super-mario-bros.html"></iframe>
  </div>

</div>

</body>
</html>
